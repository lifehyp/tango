<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고해상도 탱고 오픈 수업 포스터</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 포스터 규격: 800px x 1000px */
        .poster {
            width: 800px;
            height: 1000px;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.8)), url('welcome_bg.png') center/cover;
            position: relative;
            font-family: 'Noto Sans KR', sans-serif;
            color: #ffffff;
            overflow: hidden;
            border: 1px solid #333;
        }

        /* 장식 라인 */
        .border-line {
            position: absolute;
            top: 30px; bottom: 30px; left: 30px; right: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            pointer-events: none;
        }

        /* 상단 텍스트 */
        .header {
            position: absolute;
            top: 80px;
            width: 100%;
            text-align: center;
        }
        .header .label {
            font-size: 16px;
            letter-spacing: 8px;
            color: #d4af37;
            font-weight: 500;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #d4af37;
            margin-bottom: 5px;
        }
        .header .sub-title {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.8);
        }

        /* 중앙 공지 박스 */
        .notice-box {
            position: absolute;
            top: 450px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: center;
        }
        .free-badge {
            background: #dc2626;
            color: #fff;
            display: inline-block;
            padding: 8px 30px;
            border-radius: 30px;
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
        }
        .main-info {
            font-size: 34px;
            font-weight: 900;
            line-height: 1.4;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* 하단 정보 */
        .footer {
            position: absolute;
            bottom: 80px;
            width: 100%;
            text-align: center;
        }
        .schedule {
            font-size: 20px;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 10px;
        }
        .location {
            font-size: 18px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
        }
        .restriction {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            display: inline-block;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            color: #fca5a5;
            font-weight: 700;
            border: 1px solid rgba(252, 165, 165, 0.3);
            margin-bottom: 20px;
        }
        .contact {
            font-size: 15px;
            color: rgba(255,255,255,0.5);
        }

        /* 장식 요소 */
        .bottom-accent {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="border-line"></div>
        
        <div class="header">
            <div class="label">High-Definition Tango</div>
            <h1>Open Class</h1>
            <div class="sub-title">오픈 수업 안내</div>
        </div>

        <div class="notice-box">
            <div class="free-badge">무료</div>
            <div class="main-info">
                당신의 탱고를<br>
                고해상도로 바꿀 90분
            </div>
        </div>

        <div class="footer">
            <div class="schedule">2026. 04. 15 (WED)</div>
            <div class="location">서울시 마포구 서교동 345-21, B1</div>
            
            <div class="restriction">
                ※ 사전 신청이 완료된 분들에 한하여 입장이 가능합니다.
            </div>
            
            <div class="contact">
                문의: 카카오톡 1:1 채팅 (https://open.kakao.com/o/sdiifJRf)
            </div>
        </div>

        <div class="bottom-accent"></div>
    </div>
</body>
</html>
